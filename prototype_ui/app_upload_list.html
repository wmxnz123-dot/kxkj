<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自有数据-列表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 24px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_home.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900 absolute left-1/2 -translate-x-1/2">自有数据</div>
        <div class="w-9 h-9"></div>
      </div>
      <div class="mt-3 flex items-center gap-3">
        <div class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 flex items-center gap-2">
          <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
          <input class="bg-transparent text-sm outline-none w-full" placeholder="检索目录名称">
        </div>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-5">
      <!-- 身份资料分类 -->
      <div>
        <div class="text-sm font-bold text-gray-900 mb-3 px-1">身份资料</div>
        <div class="space-y-3">
          <!-- 已上传 -->
          <a href="./app_upload_detail.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
            <div class="flex items-center justify-between gap-3">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center">
                  <i class="fa-solid fa-id-card"></i>
                </div>
                <div>
                  <div class="text-sm font-bold text-gray-900">身份证复印件</div>
                  <div class="text-xs text-gray-500 mt-1">已上传 1 份数据</div>
                </div>
              </div>
              <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
            </div>
          </a>
          <!-- 未上传 -->
          <a href="./app_upload_form.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
            <div class="flex items-center justify-between gap-3">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gray-50 text-gray-400 flex items-center justify-center">
                  <i class="fa-solid fa-passport"></i>
                </div>
                <div>
                  <div class="text-sm font-bold text-gray-900">护照信息</div>
                  <div class="text-xs text-gray-400 mt-1">暂未上传</div>
                </div>
              </div>
              <div class="text-xs text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg font-medium">去上传</div>
            </div>
          </a>
        </div>
      </div>

      <!-- 证明材料分类 -->
      <div>
        <div class="text-sm font-bold text-gray-900 mb-3 px-1">证明材料</div>
        <div class="space-y-3">
          <!-- 已上传 -->
          <a href="./app_upload_detail.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
            <div class="flex items-center justify-between gap-3">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center">
                  <i class="fa-solid fa-file-lines"></i>
                </div>
                <div>
                  <div class="text-sm font-bold text-gray-900">手机号变更证明</div>
                  <div class="text-xs text-gray-500 mt-1">已上传 2 份数据</div>
                </div>
              </div>
              <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
            </div>
          </a>
          <!-- 未上传 -->
          <a href="./app_upload_form.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
            <div class="flex items-center justify-between gap-3">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gray-50 text-gray-400 flex items-center justify-center">
                  <i class="fa-solid fa-building"></i>
                </div>
                <div>
                  <div class="text-sm font-bold text-gray-900">工作证明</div>
                  <div class="text-xs text-gray-400 mt-1">暂未上传</div>
                </div>
              </div>
              <div class="text-xs text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg font-medium">去上传</div>
            </div>
          </a>
        </div>
      </div>

      <!-- 健康信息分类 -->
      <div>
        <div class="text-sm font-bold text-gray-900 mb-3 px-1">健康信息</div>
        <div class="space-y-3">
          <!-- 未上传 -->
          <a href="./app_upload_form.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
            <div class="flex items-center justify-between gap-3">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gray-50 text-gray-400 flex items-center justify-center">
                  <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <div>
                  <div class="text-sm font-bold text-gray-900">体检报告</div>
                  <div class="text-xs text-gray-400 mt-1">暂未上传</div>
                </div>
              </div>
              <div class="text-xs text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg font-medium">去上传</div>
            </div>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
